apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: dev
  labels:
    app: gitops-app
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
        environment: dev
    spec:
      containers:
      - name: gitops-app
        image: ghcr.io/haseef-ahamed/gitops-app:sha-631cfdf
        ports:
        - containerPort: 3000
        env:
        - name: APP_VERSION
          value: "v1.0.0"
        - name: APP_ENV
          value: "dev"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10